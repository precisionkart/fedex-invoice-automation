name: Poll FedEx Tracking

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  # Allow manual trigger from the Actions UI
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write credentials from secrets
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_TOKEN_JSON:        ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          printf '%s' "$GOOGLE_OAUTH_CLIENT_JSON" > google-oauth-client.json
          printf '%s' "$GOOGLE_TOKEN_JSON"        > google-token.json

      - name: Run poller
        env:
          SHIPPING_LOG_SHEET_ID:        ${{ secrets.SHIPPING_LOG_SHEET_ID }}
          SHOPIFY_STORE_DOMAIN:         ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_CLIENT_ID:            ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET:        ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          FEDEX_TRACK_CLIENT_ID:        ${{ secrets.FEDEX_TRACK_CLIENT_ID }}
          FEDEX_TRACK_CLIENT_SECRET:    ${{ secrets.FEDEX_TRACK_CLIENT_SECRET }}
          FEDEX_TRACK_ACCOUNT_NUMBER:   ${{ secrets.FEDEX_TRACK_ACCOUNT_NUMBER }}
          FEDEX_ENVIRONMENT:            sandbox
        run: python poll_tracking.py
