name: Alert Unscanned Shipments

on:
  schedule:
    # Daily at 09:00 UTC (10:00 BST in summer / 09:00 GMT in winter)
    - cron: "0 9 * * *"
  # Allow manual trigger from the Actions UI
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google credentials from secrets
        env:
          GOOGLE_OAUTH_CLIENT_JSON: ${{ secrets.GOOGLE_OAUTH_CLIENT_JSON }}
          GOOGLE_TOKEN_JSON:        ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: |
          printf '%s' "$GOOGLE_OAUTH_CLIENT_JSON" > google-oauth-client.json
          printf '%s' "$GOOGLE_TOKEN_JSON"        > google-token.json

      - name: Run alerter
        env:
          SHIPPING_LOG_SHEET_ID: ${{ secrets.SHIPPING_LOG_SHEET_ID }}
          ALERT_EMAIL:           ${{ secrets.ALERT_EMAIL }}
        run: python alert_unscanned.py
